# used to help Grafana connects to Clickhouse
apiVersion: 1
datasources:
  - name: ClickHouse
    type: grafana-clickhouse-datasource
    user: ${CH_USER}
    secureJsonData:
      password: ${CH_PASSWORD}
    jsonData:
      server: "clickhouse"           
      port: 8123                     
      protocol: "http"               
      defaultDatabase: "retail_stats"
    isDefault: true
    editable: true